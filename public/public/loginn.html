<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Visual Music</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="./assets/logo.png">
            <p>Visual music</p>
        </div>
        <a href="index.html">Home</a>
        <a href="musical.html">Musical</a>
        <a href="vida.html">Sobre mim</a>
        <a href="loginn.html"><img src="./assets/user.png" class="user"></a>
    </header>
    <div class="conteudo">
        <div class="formulario">
            <h1>login</h1>
            <div class="inputs">
            <p>Email:</p>
            <input type="text" id="id_email" placeholder="Insira seu email"><br>
            </div>
            <div class="inputs">
            <p>Senha:</p>
            <input type="password" id="id_senha" placeholder="Insira sua senha"><br>
            <div id="id_erro" class="erro"></div>
            </div>
            <button onclick="login()">Entrar</button>
            
            <p >Não possui uma conta? <a  href="cadastroUsuario.html"><span style="color:gold">Cadastre-se </span></a></p>
        </div>
    </div>
    <footer>
        <div class="footer">
            <div class="logo">
                <img src="./assets/logo.png">
                <p>Visual music</p>
            </div>
            <div class="indicie">
                <h3>Descubra</h3>
                <a href="index.html">Home</a>
                <a href="musical.html">Musical</a>
                <a href="vida.html">Sobre mim</a>
            </div>
        </div>

        <div>
            <h3>SPTech © 2026</h3>
        </div>

    </footer>
</body>
</html>
<script>
    function login(){
        let email=id_email.value;
        let senha=id_senha.value;



        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: email,
                senhaServer: senha
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);
                alert('Login realizado com sucesso');
                resposta.json().then(json => {
                    
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;

                });
                setTimeout(function () {
                        window.location = "famosos.html";
                    }, 1000); 

            } else {
                id_erro.innerHTML=`Email ou senha inválido`
                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
  }

    
</script>
