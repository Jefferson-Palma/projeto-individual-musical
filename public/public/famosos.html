<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/sessao.js"></script>
</head>

<body style=" background-color: #AB0505;">

    <div class="sidebar">
        <div class="rotas">
            <div class="logo">
                <img src="./assets/logo.png">
                <p>Visual music</p>
            </div>
            <h2>Bem vindo, <span id="nomeUser">nome</span>!!</h2>
            <div class="buttons">
                <a href="dashboard.html"><button>Dashboard</button></a>
                <a href="famosos.html"><button>Musicais</button></a>
                <a href="opine.html"><button>Opine</button></a>
                <a><button onclick="limparSessao()">Sair</button></a>
            </div>
        </div>
    </div>
    <div class="conteudoFamosos">
        <div class="titulos">
            <h1>Musicais famosos</h1>
            <h2>Escolha um musical para conhecer:</h2>
        </div>
        <div class="boxes" id="musicais">

        </div>
    </div>

</body>

</html>
<script>

    
    
    nomeUser.innerHTML=sessionStorage.NOME_USUARIO;
    window.onload=validarSessao();
    window.onload = exibirMusicais();
    function exibirMusicais(){
        fetch(`/musical/listar`).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    for(let i=0;i<resposta.length;i++){

                            




                        musicais.innerHTML+=`<a onclick="navegarPagina(${resposta[i].id})"<div class="musicais">
                        <img src="${resposta[i].imagem}">
                        <h2>${resposta[i].nome}</h2></a>
                    </div>`
                    }
                    // resposta.forEach(item => {
                    //     musicais.innerHTML+=`<a onclick="navegarPagina(${item.id})"<div class="musicais">
                    //     <img src="${item.imagem}">
                    //     <h2>${item.nome}</h2></a>
                    // </div>`
                    // });
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados: ${error.message}`);
            });
    }


    function navegarPagina(idMusical){
        sessionStorage.ID_MUSICAL=idMusical
        setTimeout(function () {
            window.location = "verMusical.html";
        }, 1000);
    }
</script>
