<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opine | Visual Music</title>
    <link rel="stylesheet" href="./css/style.css">
    
    <script src="./js/sessao.js"></script>
</head>

<body style=" background-color: #AB0505;">

    <div class="sidebar">
        <div class="rotas">
            <div class="logo">
                <img src="./assets/logo.png">
                <p>Visual music</p>
            </div>
            <h2>Bem vindo, <span id="nomeUser">nome</span>!!</h2>
            <div class="buttons">
                <a href="dashboard.html"><button>Dashboard</button></a>
                <a href="famosos.html"><button>Musicais</button></a>
                <a href="opine.html"><button>Opine</button></a>
                <a><button onclick="limparSessao()">Sair</button></a>
            </div>
        </div>
    </div>
    <div class="conteudoOpine">
        <div class="forms">
            <div class="titulos">
                <h1>Nos de sua opinião</h1>
            </div>
            <div class="alinhamento">
                
                <div class="linha">
                    <h2>Qual musical você mais gostou?</h2>
                     <select name="" id="musicais"></select>
                </div>
                <div class="linha">
                    <h2>Qual nota você dá para ele?</h2>
                    <input type="text" placeholder="Digite uma nota de 0 a 5" id="id_nota">
                </div>
                <div class="linha">
                    <h2>Deixe um comentário:</h2>
                    <textarea rows="5" maxlength="255" type="text" placeholder="Digite um comentário" id="id_comentario"></textarea>
                </div>
            </div>
            <button onclick="cadastrarOpiniao()">Enviar</button>
            
        </div>

    </div>

</body>

</html>
<script>
    nomeUser.innerHTML = sessionStorage.NOME_USUARIO;
    window.onload=validarSessao();
    window.onload = chamarMusicais();
    function chamarMusicais(){
        fetch(`/musical/listar`).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    for(let i=0;i<resposta.length;i++){
                        musicais.innerHTML+=`<option value="${resposta[i].id}">${resposta[i].nome}</option>`
                    };
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados: ${error.message}`);
            });
    }

    function cadastrarOpiniao(){
        let numeros=[0,1,2,3,4,5]
        let musical=musicais.value;
        let nota=id_nota.value;
        let contador=0;
        let comentario=id_comentario.value;
        for(let i=0;i<nota.length;i++){
            for(let j=0;j<numeros.length;j++){
                if(nota[i]==numeros[j]){
                    contador++
                }
            }
        }
        if(contador!=nota.length || nota>5 || nota<0){
            alert("Nota inválida")
            return
        }

        
        fetch("/opine/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        idMusical: musical,
        idUsuario: sessionStorage.ID_USUARIO,
        opiniao: comentario,//campo cpf
        notaMusical: nota,
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          //cardErro.style.display = "block";

          alert(
            "Avaliação registrada com sucesso!!"
)
          setTimeout(() => {
            window.location = "famosos.html";
          }, "2000");

        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });

    return false;
    }
</script>
