<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Musical | Visual Music</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/sessao.js"></script>
</head>

<body style=" background-color: #AB0505;">

    <div class="sidebar">
        <div class="rotas">
            <div class="logo">
                <img src="./assets/logo.png">
                <p>Visual music</p>
            </div>
            <h2>Bem vindo, <span id="nomeUser">nome</span>!!</h2>
            <div class="buttons">
                <a href="dashboard.html"><button>Dashboard</button></a>
                <a href="famosos.html"><button>Musicais</button></a>
                <a href="opine.html"><button>Opine</button></a>
                <a><button onclick="limparSessao()">Sair</button></a>
            </div>
        </div>
    </div>
    <div class="conteudoFamosos">
        <div class="titulos">
        <h1 id="id_titulo">Titulo</h1>
        </div>
        <div class="container" id="img_desc">

        </div>    
        <div class="container">
            <h1>Trailer</h1>
            <div id="trailer"></div>
        </div>
        <div class="titulos">
                <h1>Avaliações</h1>
            </div>
        <div id="container" class="container">
            
        </div>
    </div>
                

</body>

</html>
<script>
    nomeUser.innerHTML=sessionStorage.NOME_USUARIO;
    window.onload=validarSessao();
    window.onload=exibirMusical();
    window.onload=listarAvaliacoes();
    function listarAvaliacoes(){
        fetch(`/opine/buscar/${sessionStorage.ID_MUSICAL}`).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    if(resposta.length>0){
                    for(let i=0; i<resposta.length;i++){
                        container.innerHTML+=`
                         
            <div class="avaliacao">
                <div class="bloco">
                    <div style="display:flex; justify-content:space-between;width:100%; border-bottom: solid yellow 5px;">
                <div><p>${resposta[i].nome}</p></div>
                <div style="display: flex; align-items: center;"><p>${resposta[i].nota}</p><img src="./assets/estrela.png" style="width: 20px; height: 20px; "></div>    
            
                </div><br>
            
            <p>${resposta[i].comentario}</p>
            <br>
            <span>${resposta[i].dtComentario}</span>
                </div>
            </div>
            
            
            
            
                        `
                    }
                }else{
                    container.innerHTML=`<div><h1>Não há avaliações realizadas</h1></div>`
                }
            }
            );
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados: ${error.message}`);
            });
    }
    function exibirMusical(){
        fetch(`/musical/buscar/${sessionStorage.ID_MUSICAL}`).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    id_titulo.innerHTML=resposta[0].nome;

                    img_desc.innerHTML=`<img src="${resposta[0].imagem}"></img>
                    <div class="sinopse">
                        <h1>Sinopse:</h1><p>${resposta[0].descricao}</p>
                        <h1>Lançamento:</h1><p>${resposta[0].dtLancamento}</p>
                    
                    </div>`


                    trailer.innerHTML=`<iframe src="${resposta[0].trailer}" allowfullscreen></iframe>`
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados: ${error.message}`);
            });
    }
</script>
