    function obterDadosGrafico1() {
        fetch(`/opine/buscarRegistro`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    //resposta.reverse();
                    console.log(JSON.stringify(resposta));

                    plotarGrafico1(resposta);

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }

    function plotarGrafico1(resposta) {

        console.log('iniciando plotagem do gráfico...');

        // Criando estrutura para plotar gráfico - labels
        let labels = [];

        // Criando estrutura para plotar gráfico - dados
        let dados = {
            labels: labels,
            datasets: [{
                label: 'Média das notas',
                indexAxis: 'y',
                data: [],
                borderWidth: 2,
                borderColor: 'lightblue',
                backgroundColor: 'blue',
            }
        ]
        };

        console.log('----------------------------------------------')
        console.log('Estes dados foram recebidos pela funcao "obterDadosGrafico" e passados para "plotarGrafico":')
        console.log(resposta)

        // Inserindo valores recebidos em estrutura para plotar o gráfico
        for (i = 0; i < resposta.length; i++) {
            var registro = resposta[i];//pega a linha
            labels.push(registro.nome);//joga no label
            dados.datasets[0].data.push(registro.media_notas);
            // dados.datasets[1].data.push(registro.temperatura);
        }

        console.log('----------------------------------------------')
        console.log('O gráfico será plotado com os respectivos valores:')
        console.log('Labels:')
        console.log(labels)
        console.log('Dados:')
        console.log(dados.datasets)
        console.log('----------------------------------------------')

        // Criando estrutura para plotar gráfico - config
        const config = {
            type: 'bar',
            data: dados,
            
        };

        // Adicionando gráfico criado em div na tela
        let myChart = new Chart(
            document.getElementById(`myChart`),
            config
        );
        myChart.update();

      //  setInterval(() => obterDadosGrafico(), 2000);
    }

    function buscarComentario(){
        fetch(`/opine/buscarComentario`).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    nomeComentario.innerHTML=resposta[0].nome;
                    qtdComentario.innerHTML=resposta[0].qtdAvaliacao;
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados: ${error.message}`);
            });

    }
    function buscarObra(){
        fetch(`/opine/buscarObra`).then(function (response) {

                    obraFavorita.innerHTML=resposta[0].nome;

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {

        });

    }
    function buscarGenero(){
