<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Visual Music</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./js/sessao.js"></script>
</head>

<body style=" background-color: #AB0505;">

    <div class="sidebar">
        <div class="rotas">
            <div class="logo">
                <img src="./assets/logo.png">
                <p>Visual music</p>
            </div>
            
            <div class="buttons">
                <button>Dashboard</button>
                <a href="famosos.html"><button>Musicais</button></a>
                <a href="opine.html"><button>Opine</button></a>
                <a><button onclick="limparSessao()">Sair</button></a>
            </div>
        </div>
    </div>
    <div class="conteudoDash">
        <div class="tituloDash">
            <h1>Olá, <span id="nomeUser">usuario</span>!!</h1>
        </div>
        <div class="kpis">
            <div class="kpi">
                <h2>Obra favorita do público</h2>
                <h1 id="obraFavorita">titulo</h1>
                <div class="info">
                    <p>Média de nota da obra</p>
                    <p id="mediaObra">4.5</p>
                </div>
            </div>
            <div class="kpi">
                <h2>Gênero favorito do público</h2>
                <h1 id="generoFavorito">titulo</h1>
                <div class="info">
                    <p>Média de nota do gênero</p>
                    <p id="mediaGenero">4.5</p>
                </div>
            </div>
            <div class="kpi">
                <h2>Obra mais comentada</h2>
                <h1 id="nomeComentario">titulo</h1>
                <div class="info">
                    <p>Quantidade de comentários</p>
                    <p id="qtdComentario">4.5</p>
                </div>
            </div>
        </div>
        <div class="dashboard">
            <h1>Média das notas das obras</h1>
            <canvas id="myChart"></canvas>
        </div>
        <div class="dashboard">
            <h1>Quantidade de comentários das obras</h1>
            <canvas id="myChart2"></canvas>
        </div>

    </div>

</body>

</html>
<script>
    nomeUser.innerHTML = sessionStorage.NOME_USUARIO;

    window.onload=validarSessao();
    window.onload = obterDadosGrafico();
    function obterDadosGrafico() {
        obterDadosGrafico1();
        obterDadosGrafico2();
    }   

    function obterDadosGrafico1() {
        fetch(`/opine/buscarRegistro`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    console.log(JSON.stringify(resposta));

                    plotarGrafico1(resposta);

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }


    function obterDadosGrafico2() {

        fetch(`/opine/buscarQtdComentario`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    console.log(JSON.stringify(resposta));

                    plotarGrafico2(resposta);

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }

    function plotarGrafico1(resposta) {

        console.log('iniciando plotagem do gráfico...');

        // Criando estrutura para plotar gráfico - labels
        let labels = [];

        // Criando estrutura para plotar gráfico - dados
        let dados = {
            labels: labels,
            datasets: [{
                label: 'Média das notas',
                indexAxis: 'y',
                data: [],
                borderWidth: 2,
                borderColor: 'lightblue',
                backgroundColor: 'blue',
            }
            ]
        };

        console.log('----------------------------------------------')
        console.log('Estes dados foram recebidos pela funcao "obterDadosGrafico" e passados para "plotarGrafico":')
        console.log(resposta)

        // Inserindo valores recebidos em estrutura para plotar o gráfico
        for (i = 0; i < resposta.length; i++) {
            var registro = resposta[i];//pega a linha
            labels.push(registro.nome);//joga no label
            dados.datasets[0].data.push(registro.media_notas);
        }

        console.log('----------------------------------------------')
        console.log('O gráfico será plotado com os respectivos valores:')
        console.log('Labels:')
        console.log(labels)
        console.log('Dados:')
        console.log(dados.datasets)
        console.log('----------------------------------------------')

        // Criando estrutura para plotar gráfico - config
        const config = {
            type: 'bar',
            data: dados,

        };

        // Adicionando gráfico criado em div na tela
        let myChart = new Chart(
            document.getElementById(`myChart`),
            config
        );
        myChart.update();
        setTimeout(() => atualizarGrafico1(dados, myChart), 10000);
    }

    function plotarGrafico2(resposta) {
        console.log('iniciando plotagem do gráfico...');

        // Criando estrutura para plotar gráfico - labels
        let labels = [];

        // Criando estrutura para plotar gráfico - dados
        let dados = {
            labels: labels,
            datasets: [{
                label: 'Quantidade comentários',
                indexAxis: 'y',
                data: [],
                borderWidth: 2,
                borderColor: 'lightblue',
                backgroundColor: 'blue',
            }
            ]
        };

        console.log('----------------------------------------------')
        console.log('Estes dados foram recebidos pela funcao "obterDadosGrafico" e passados para "plotarGrafico":')
        console.log(resposta)

        // Inserindo valores recebidos em estrutura para plotar o gráfico
        for (i = 0; i < resposta.length; i++) {
            var registro = resposta[i];//pega a linha
            labels.push(registro.nome);//joga no label
            dados.datasets[0].data.push(registro.qtdAvaliacao);
        }

        console.log('----------------------------------------------')
        console.log('O gráfico será plotado com os respectivos valores:')
        console.log('Labels:')
        console.log(labels)
        console.log('Dados:')
        console.log(dados.datasets)
        console.log('----------------------------------------------')

        // Criando estrutura para plotar gráfico - config
        const config = {
            type: 'bar',
            data: dados,

        };

        var myChart2 = new Chart(
            document.getElementById(`myChart2`),
            config
        )
        setTimeout(() => atualizarGrafico2(dados, myChart2), 10000);
    }


    function atualizarGrafico2(dados, myChart) {
        fetch(`/opine/buscarQtdComentario`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    //resposta.reverse();
                    console.log(JSON.stringify(resposta));
                    let labelNovos = []
                    let dadosNovos = []
                    for (i = 0; i < resposta.length; i++) {
                        var registro = resposta[i];//pega a linha
                        labelNovos.push(registro.nome);//joga no label
                        dadosNovos.push(registro.qtdAvaliacao);
                        // dados.datasets[1].data.push(registro.temperatura);
                    }
                    dados.datasets[0].data = dadosNovos;
                    dados.labels = labelNovos;
                    console.log(dados);
                    myChart.update();
                    setTimeout(() => atualizarGrafico2(dados, myChart), 10000);

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });

    }
    
    function atualizarGrafico1(dados, myChart) {
        fetch(`/opine/buscarRegistro`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    //resposta.reverse();
                    console.log(JSON.stringify(resposta));
                    //plotarGrafico2(resposta);
                    let labelNovos = []
                    let dadosNovos = []
                    for (i = 0; i < resposta.length; i++) {
                        var registro = resposta[i];//pega a linha
                        labelNovos.push(registro.nome);//joga no label
                        dadosNovos.push(registro.media_notas);
                        // dados.datasets[1].data.push(registro.temperatura);
                    }
                    dados.datasets[0].data = dadosNovos;
                    dados.labels = labelNovos;
                    console.log(dados);
                    myChart.update();
                    setTimeout(() => atualizarGrafico1(dados, myChart), 2000);

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });

    }











    Chart.defaults.color = '#FFF';
 
    window.onload = chamarKpis();
    function chamarKpis() {
        buscarGenero();
        buscarComentario();
        buscarObra();

        setTimeout(() => chamarKpis(), 10000);
    }


    function buscarComentario() {
        fetch(`/opine/buscarComentario`).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    nomeComentario.innerHTML = resposta[0].nome;
                    qtdComentario.innerHTML = resposta[0].qtdAvaliacao;
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados: ${error.message}`);
            });

    }
    function buscarObra() {
        fetch(`/opine/buscarObra`).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    obraFavorita.innerHTML = resposta[0].nome;
                    mediaObra.innerHTML = resposta[0].mediaNota;

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados: ${error.message}`);
            });

    }
    function buscarGenero() {
        fetch(`/opine/buscarGenero`).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    mediaGenero.innerHTML = resposta[0].mediaNota;
                    generoFavorito.innerHTML = resposta[0].tipoMusical;

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados: ${error.message}`);
            });


    }


</script>
